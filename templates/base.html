<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTMAX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#009739">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">FUT<span class="text-warning">MAX</span></a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">⚽ Resultados</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="rankingDropdown" role="button" data-bs-toggle="dropdown">
                            📊 Rankings
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="rankingDropdown">
                            <li><a class="dropdown-item" href="/ranking/pontos">Pontos</a></li>
                            <li><a class="dropdown-item" href="/ranking/gols">🎯 Gols</a></li>
                            <li><a class="dropdown-item" href="/ranking/defesa">🛡️ Defesa</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/ligas">📋 Classificação Completa</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/artilharia">🎯 Artilharia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/comparador">⚔️ Comparador</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pesquisa">🔍 Times</a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-2">
                    <button id="notifications-btn" class="btn btn-sm btn-outline-light position-relative">
                        🔔 <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="notif-badge">0</span>
                    </button>
                    <button id="theme-toggle" class="btn btn-sm btn-outline-light">🌙 Escuro</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='utilities.js') }}"></script>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Função para atualizar o texto do botão
        const updateButtonText = (isDark) => {
            themeToggle.innerText = isDark ? '☀️ Modo Claro' : '🌙 Modo Escuro';
        };

        // Carregar tema salvo no localStorage
        if (localStorage.getItem('theme') === 'dark') {
            body.setAttribute('data-theme', 'dark');
            updateButtonText(true);
        }

        themeToggle.addEventListener('click', () => {
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                updateButtonText(false);
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                updateButtonText(true);
            }
        });
    </script>
</body>
</html>
