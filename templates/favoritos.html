{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold mb-3">⭐ Meus Times Favoritos</h1>
        <p class="text-muted">Acompanhe seus clubes favoritos</p>
    </div>

    <div id="favoritos-container" class="row">
        <p class="text-center text-muted col-12">Carregando favoritos...</p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const container = document.getElementById('favoritos-container');
    
    function loadFavorites() {
        return JSON.parse(localStorage.getItem('futmax_favorites') || '[]');
    }
    
    const teamIds = loadFavorites();
    
    if (teamIds.length === 0) {
        container.innerHTML = '<p class="col-12 text-center text-muted">Você ainda não tem favoritos. <a href="/pesquisa">Comece a adicionar!</a></p>';
        return;
    }
    
    container.innerHTML = '';
    let count = 0;
    
    for (const id of teamIds) {
        try {
            const res = await fetch(`/api/team/${id}`);
            const team = await res.json();
            
            if (team.erro) continue;
            
            const card = document.createElement('div');
            card.className = 'col-md-4 mb-4';
            card.innerHTML = `
                <div class="card card-jogo h-100 animate-card shadow-sm">
                    <div class="card-body text-center">
                        <img src="${team.crest}" style="max-height: 80px;" class="mb-3">
                        <h5 class="fw-bold">${team.name}</h5>
                        <p class="text-muted small">⭐ Fundado: ${team.founded}</p>
                        <div class="d-flex gap-2 justify-content-center">
                            <a href="/time/${team.id}" class="btn btn-sm btn-outline-success">Ver Perfil</a>
                            <button class="btn btn-sm btn-outline-danger" onclick="removeFav(${team.id})">Remover</button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            count++;
        } catch (e) {
            console.error('Erro ao carregar time:', e);
        }
    }
    
    if (count === 0) {
        container.innerHTML = '<p class="col-12 text-center text-muted">Nenhum time carregado</p>';
    }
});

function removeFav(teamId) {
    let favs = JSON.parse(localStorage.getItem('futmax_favorites') || '[]');
    favs = favs.filter(id => id !== teamId);
    localStorage.setItem('futmax_favorites', JSON.stringify(favs));
    Utils.showToast('Removido dos favoritos', 'info');
    setTimeout(() => location.reload(), 500);
}
</script>
{% endblock %}
